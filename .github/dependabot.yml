version: 2
updates:
  # Root package.json
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
      day: monday
    target-branch: 'main'
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # apps/api
  - package-ecosystem: npm
